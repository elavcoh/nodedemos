<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pokemon search</title>
  <link rel="stylesheet" href="pokemon.css" />
</head>
<body>
  <!-- loading message shown while pokemon data loads -->
  <div id="loading-screen" class="loading-screen">loading pokemon...</div>

  <div class="search-container">
    <h1>pokemon search</h1>
    <div class="search-controls">
      <!-- input for user to type search query -->
      <input type="text" id="pokemon-input" placeholder="enter your search..." />
      <!-- dropdown to select type of search (name, id, type, ability) -->
      <select id="search-type">
        <option value="name">name</option>
        <option value="id">id</option>
        <option value="type">type</option>
        <option value="ability">ability</option>
      </select>
      <!-- buttons to start the search and to clear results  -->
      <button id="search-button">Search</button>
      <button id="clear-button">Clear</button>
      
    </div>
    <!-- place to show error messages if search fails -->
    <div id="error-message" class="error-message"></div>
  </div>

  <!-- link to go to favorites page -->
  <a href="favorites.html" id="go-to-favorites" class="favorites-button">go to favorites</a>

  <!-- container where search results (pokemon cards) will appear -->
  <div id="pokemon-container" class="pokemon-grid"></div>

  <!-- favorites section, hidden by default here (maybe used in other views) -->
  <div id="favorites-page" class="favorites-page" style="display: none;">
    <h2>your favorites</h2>
    <div id="favorites-container"></div>
  </div>

  <script src="pokemon.js"></script>
</body>
</html>
